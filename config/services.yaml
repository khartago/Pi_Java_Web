# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:
    app.product_upload_dir: '%kernel.project_dir%/public/uploads/products'
    app.product_upload_path: 'uploads/products'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    App\Service\ProductImageStorage:
        arguments:
            $productUploadDir: '%app.product_upload_dir%'
            $productUploadPath: '%app.product_upload_path%'

    App\Service\AiAssistantClient:
        arguments:
            $apiKey: '%env(OLLAMA_API_KEY)%'
            $model: '%env(OLLAMA_MODEL)%'
            $baseUrl: '%env(OLLAMA_BASE_URL)%'

    App\Command\SendCriticalAlertsCommand:
        arguments:
            $alertFromEmail: '%env(ALERT_EMAIL_FROM)%'
            $alertToEmail: '%env(ALERT_EMAIL_TO)%'
            $stockThreshold: '%env(int:ALERT_STOCK_THRESHOLD)%'

    App\Command\CheckStockCommand:
        arguments:
            $alertFromEmail: '%env(ALERT_EMAIL_FROM)%'
            $alertToEmail: '%env(ALERT_EMAIL_TO)%'
            $stockThreshold: '%env(int:ALERT_STOCK_THRESHOLD)%'

    App\Service\AssistantContextBuilder:
        arguments:
            $stockThreshold: '%env(int:ALERT_STOCK_THRESHOLD)%'

    App\Controller\Api\AlertController:
        arguments:
            $alertFromEmail: '%env(ALERT_EMAIL_FROM)%'
            $alertToEmail: '%env(ALERT_EMAIL_TO)%'
            $stockThreshold: '%env(int:ALERT_STOCK_THRESHOLD)%'

    App\Controller\Api\ProduitApiController:
        arguments:
            $stockThreshold: '%env(int:ALERT_STOCK_THRESHOLD)%'

    App\Service\ProduitStatsService:
        arguments:
            $stockThreshold: '%env(int:ALERT_STOCK_THRESHOLD)%'

    App\Controller\AdminDashboardController:
        arguments:
            $stockThreshold: '%env(int:ALERT_STOCK_THRESHOLD)%'